{% set name = "httpx-gssapi" %}
{% set version = "0.6" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: 03df3de8195e18c50690d44beadfdc514df8a2055cb5e773a2faa85fc3985f18

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - pip
    - setuptools
  run:
    - python >={{ python_min }}
    - httpx >=0.16,<0.29
    - python-gssapi

test:
  imports:
    - httpx_gssapi
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/pythongssapi/httpx-gssapi
  summary: A Python GSSAPI authentication handler for HTTPX
  license: ISC
  license_file: LICENSE

extra:
  recipe-maintainers:
    - jack-pappas
    - seowalex
